version: '3.8'

services:
  db:
    # WARNING: Port 5432 and default plaintext passwords are exposed for LOCAL DEV ONLY.
    # DO NOT use this configuration as-is in production.
    image: postgis/postgis:15-3.3
    container_name: rila_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rila}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rilapassword}
      POSTGRES_DB: ${POSTGRES_DB:-rila}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  bot:
    build: .
    container_name: rila_bot
    command: python src/bot/main.py
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ALLOWED_USER_ID=${ALLOWED_USER_ID}
      - INSTAGRAM_COOKIES_PATH=${INSTAGRAM_COOKIES_PATH}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rila}:${POSTGRES_PASSWORD:-rilapassword}@db:5432/${POSTGRES_DB:-rila}
    depends_on:
      - db
    volumes:
      - ./src:/app/src
      - ./cookies:/app/cookies
    restart: unless-stopped

volumes:
  db_data:
